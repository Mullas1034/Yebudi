# Full local / self-hosted stack: TimescaleDB + ingestion worker + web.
#   docker compose up -d --wait                          # starts db + web
#   docker compose run --rm worker daily --date <date>   # runs the batch ingestion CLI
#
# Migrations in db/migrations auto-apply only on the FIRST init of an empty volume
# (Postgres docker-entrypoint-initdb.d). For later schema changes, apply explicitly
# (see db/README.md).

services:
  db:
    image: timescale/timescaledb:latest-pg16 # pin to a specific patch tag for prod
    container_name: garmin-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: garmin
      POSTGRES_PASSWORD: garmin
      POSTGRES_DB: garmin
    ports:
      - "5432:5432"
    volumes:
      - garmin_pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garmin -d garmin"]
      interval: 5s
      timeout: 5s
      retries: 12

  worker:
    build: ./worker
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://garmin:garmin@db:5432/garmin # host = service name
      GARMIN_SOURCE: ${GARMIN_SOURCE:-python-garminconnect}
      GARMIN_EMAIL: ${GARMIN_EMAIL:-}
      GARMIN_PASSWORD: ${GARMIN_PASSWORD:-}
    profiles: ["cli"] # not started by `up`; invoke with `docker compose run`
    restart: "no"

  web:
    build: ./web
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL_NODE: postgres://garmin:garmin@db:5432/garmin
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  garmin_pgdata:
